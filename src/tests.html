<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PLANEL · Tests</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #0F172A; }
    h1 { margin: 0 0 1rem; }
    h2 { margin: 1.6rem 0 0.5rem; font-size: 1.1rem; }
    .stat { display: inline-block; padding: 0.3rem 0.7rem; border-radius: 6px; font-weight: 600; margin-right: 0.5rem; }
    .stat.ok { background: #D1FAE5; color: #065F46; }
    .stat.fail { background: #FEE2E2; color: #991B1B; }
    .stat.total { background: #E2E8F0; color: #0F172A; }
    .t { padding: 0.35rem 0.5rem; border-radius: 4px; font-family: ui-monospace, Menlo, monospace; font-size: 0.82rem; margin-bottom: 2px; }
    .t.pass { color: #047857; }
    .t.pass::before { content: "✔ "; }
    .t.fail { color: #B91C1C; background: #FEF2F2; }
    .t.fail::before { content: "✖ "; }
    .reason { color: #991B1B; font-size: 0.75rem; margin-left: 1.4rem; }
    #summary { margin-bottom: 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>PLANEL · Self-tests</h1>
  <p>Покрывает ключевую логику: работа со storage, дата/серия/фильтры, аналитика.<br/>
     Выполняется в текущем window, изоляция через prefix <code>test_</code>.</p>
  <div id="summary"></div>
  <div id="out"></div>

<script>
(() => {
  const results = [];
  const groups = {};
  function group(name, fn) {
    const g = { name, tests: [] };
    groups[name] = g;
    const t = (label, fn2) => {
      try { fn2(); g.tests.push({ label, ok: true }); }
      catch (e) { g.tests.push({ label, ok: false, err: e.message || String(e) }); }
    };
    fn(t);
  }
  function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }
  function eq(a, b, msg) { if (JSON.stringify(a) !== JSON.stringify(b)) throw new Error(`${msg||''}: expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }

  // ---------- Pure helpers (мирроринг тех, что в app.html) ----------
  const todayISO = () => new Date().toISOString().slice(0, 10);
  const addDaysISO = (iso, days) => { const d = new Date(iso); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); };
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const weekStart = (d) => { const x = new Date(d); const diff = (x.getDay() + 6) % 7; x.setDate(x.getDate() - diff); x.setHours(0,0,0,0); return x; };

  // localStorage wrappers with isolation
  const PREFIX = 'test_planel_';
  function loadBucket(bucket, fallback) {
    try { return JSON.parse(localStorage.getItem(PREFIX + bucket) || 'null') ?? fallback; }
    catch { return fallback; }
  }
  function saveBucket(bucket, data) { localStorage.setItem(PREFIX + bucket, JSON.stringify(data)); }
  function clearTestKeys() { Object.keys(localStorage).filter(k => k.startsWith(PREFIX)).forEach(k => localStorage.removeItem(k)); }

  // Habit streak (from app)
  function isHabitDone(logs, id, iso) { return !!(logs[id] && logs[id][iso]); }
  function toggleHabitLog(logs, id, iso) { logs[id] = logs[id] || {}; if (logs[id][iso]) delete logs[id][iso]; else logs[id][iso] = true; return !!logs[id][iso]; }
  function computeStreak(logs, id, fromISO = todayISO()) {
    let streak = 0; let cursor = fromISO;
    while (isHabitDone(logs, id, cursor)) { streak++; cursor = addDaysISO(cursor, -1); }
    return streak;
  }

  // Analytics (tasks + projects)
  function computeAnalytics(tasks, statusOf, projectIdOf, projects) {
    const today = todayISO();
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const inProgress = tasks.filter(t => !t.done && statusOf(t) === 'in_progress').length;
    const overdue = tasks.filter(t => !t.done && t.due_date && t.due_date < today).length;
    const byPrio = { high:0, medium:0, low:0 };
    tasks.forEach(t => { if (byPrio[t.priority] !== undefined) byPrio[t.priority]++; });
    const projectBreakdown = projects.map(p => {
      const list = tasks.filter(t => projectIdOf(t) === p.id);
      const d = list.filter(t => t.done).length;
      return { id: p.id, total: list.length, done: d, pct: list.length ? Math.round(d/list.length*100) : 0 };
    });
    return { total, done, inProgress, overdue, byPrio, projectBreakdown };
  }

  // Eisenhower matrix
  function eisenhower(tasks, today = todayISO()) {
    const q = { q1: [], q2: [], q3: [], q4: [] };
    tasks.forEach(t => {
      const important = t.priority === 'high';
      const urgent = t.due_date && (t.due_date <= addDaysISO(today, 2));
      if (important && urgent) q.q1.push(t);
      else if (important) q.q2.push(t);
      else if (urgent) q.q3.push(t);
      else q.q4.push(t);
    });
    return q;
  }

  // Notes filter
  function filterNotes(notes, query) {
    const q = (query || '').toLowerCase().trim();
    const sorted = [...notes].sort((a,b) => (b.updated_at || b.created_at).localeCompare(a.updated_at || a.created_at));
    if (!q) return sorted;
    return sorted.filter(n =>
      (n.title || '').toLowerCase().includes(q) ||
      (n.content || '').toLowerCase().includes(q) ||
      (n.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  // ---------- Тесты ----------
  clearTestKeys();

  group('Date helpers', (t) => {
    t('todayISO возвращает YYYY-MM-DD', () => {
      assert(/^\d{4}-\d{2}-\d{2}$/.test(todayISO()), 'формат');
    });
    t('addDaysISO(+1)', () => eq(addDaysISO('2026-01-01', 1), '2026-01-02'));
    t('addDaysISO(-1)', () => eq(addDaysISO('2026-01-01', -1), '2025-12-31'));
    t('addDaysISO пересекает месяц', () => eq(addDaysISO('2026-02-28', 2), '2026-03-02'));
    t('weekStart для понедельника', () => {
      const mon = new Date(2026, 3, 20); // Mon, локально
      const w = weekStart(mon);
      eq([w.getFullYear(), w.getMonth(), w.getDate()], [2026, 3, 20]);
    });
    t('weekStart для воскресенья отдаёт предыдущий понедельник', () => {
      const sun = new Date(2026, 3, 26); // Sun
      const w = weekStart(sun);
      eq([w.getFullYear(), w.getMonth(), w.getDate()], [2026, 3, 20]);
    });
  });

  group('HTML escape', (t) => {
    t('&<>"\'  → сущности', () => eq(escapeHtml(`<b>&"'</b>`), '&lt;b&gt;&amp;&quot;&#39;&lt;/b&gt;'));
    t('null → ""', () => eq(escapeHtml(null), ''));
  });

  group('localStorage store', (t) => {
    t('save / load объект', () => {
      saveBucket('notes', [{ id: '1', title: 'A' }]);
      eq(loadBucket('notes', []), [{ id: '1', title: 'A' }]);
    });
    t('load с fallback на пустой массив', () => {
      eq(loadBucket('nonexistent', []), []);
    });
    t('load корректно при битом JSON', () => {
      localStorage.setItem(PREFIX + 'broken', 'not a json {');
      eq(loadBucket('broken', []), []);
    });
    t('save перезаписывает', () => {
      saveBucket('notes', [{ id: '2' }]);
      eq(loadBucket('notes', []), [{ id: '2' }]);
    });
  });

  group('Habit streak', (t) => {
    const logs = {};
    toggleHabitLog(logs, 'h1', '2026-04-21');
    toggleHabitLog(logs, 'h1', '2026-04-20');
    toggleHabitLog(logs, 'h1', '2026-04-19');
    t('3 дня подряд от 2026-04-21', () => eq(computeStreak(logs, 'h1', '2026-04-21'), 3));
    t('пропуск сегодня → streak=0', () => eq(computeStreak(logs, 'h1', '2026-04-22'), 0));
    t('toggle снимает отметку', () => {
      toggleHabitLog(logs, 'h1', '2026-04-20');
      eq(computeStreak(logs, 'h1', '2026-04-21'), 1);
    });
  });

  group('Analytics', (t) => {
    const today = todayISO();
    const tasks = [
      { id: 't1', priority: 'high',   done: true,  due_date: today },
      { id: 't2', priority: 'high',   done: false, due_date: addDaysISO(today, 1) },
      { id: 't3', priority: 'medium', done: false, due_date: addDaysISO(today, -1) },  // overdue
      { id: 't4', priority: 'low',    done: false, due_date: null },
      { id: 't5', priority: 'medium', done: false, due_date: addDaysISO(today, 3) }
    ];
    const meta = { t1: { project_id: 'p1', status: 'done' }, t2: { project_id: 'p1', status: 'in_progress' }, t3: { project_id: null, status: 'todo' }, t5: { project_id: 'p1', status: 'todo' } };
    const statusOf = (task) => task.done ? 'done' : (meta[task.id]?.status || 'todo');
    const projectIdOf = (task) => meta[task.id]?.project_id || null;
    const projects = [{ id: 'p1', name: 'Проект А' }];
    const a = computeAnalytics(tasks, statusOf, projectIdOf, projects);
    t('total = 5', () => eq(a.total, 5));
    t('done = 1', () => eq(a.done, 1));
    t('in_progress = 1', () => eq(a.inProgress, 1));
    t('overdue = 1 (просрочена t3)', () => eq(a.overdue, 1));
    t('распределение по приоритетам', () => eq(a.byPrio, { high: 2, medium: 2, low: 1 }));
    t('разбивка по проекту p1: 3 задачи, 1 done, 33%', () => {
      const p = a.projectBreakdown[0];
      eq(p.total, 3); eq(p.done, 1); eq(p.pct, 33);
    });
  });

  group('Eisenhower matrix', (t) => {
    const today = todayISO();
    const tasks = [
      { id: '1', priority: 'high',   due_date: today },                    // q1
      { id: '2', priority: 'high',   due_date: addDaysISO(today, 30) },    // q2
      { id: '3', priority: 'medium', due_date: today },                    // q3
      { id: '4', priority: 'low',    due_date: null }                       // q4
    ];
    const q = eisenhower(tasks);
    t('q1 (важно+срочно): high с ближним due', () => eq(q.q1.map(x=>x.id), ['1']));
    t('q2 (важно, не срочно): high без срочного due', () => eq(q.q2.map(x=>x.id), ['2']));
    t('q3 (срочно, не важно): medium со срочным due', () => eq(q.q3.map(x=>x.id), ['3']));
    t('q4 (ни то, ни другое): low без дедлайна', () => eq(q.q4.map(x=>x.id), ['4']));
  });

  group('Notes filter', (t) => {
    const notes = [
      { id:'1', title:'Книга', content:'Главная идея', tags:['книга','идея'], updated_at:'2026-04-21T10:00:00Z' },
      { id:'2', title:'Работа', content:'План на неделю', tags:['работа'], updated_at:'2026-04-21T11:00:00Z' },
      { id:'3', title:'Рецепт', content:'', tags:[], created_at:'2026-04-20T10:00:00Z' }
    ];
    t('пустой запрос — отсортированы по updated_at DESC', () => {
      eq(filterNotes(notes, '').map(n => n.id), ['2','1','3']);
    });
    t('поиск по заголовку', () => {
      eq(filterNotes(notes, 'книг').map(n => n.id), ['1']);
    });
    t('поиск по содержимому', () => {
      eq(filterNotes(notes, 'план').map(n => n.id), ['2']);
    });
    t('поиск по тегу', () => {
      eq(filterNotes(notes, 'работа').map(n => n.id), ['2']);
    });
    t('ничего не нашло', () => {
      eq(filterNotes(notes, 'zzzz').length, 0);
    });
  });

  group('Food diary agg', (t) => {
    const today = todayISO();
    const items = [
      { datetime: today+'T09:00', calories: 400, drinks_ml: 250 },
      { datetime: today+'T13:00', calories: 650, drinks_ml: 500 },
      { datetime: addDaysISO(today, -1)+'T09:00', calories: 300, drinks_ml: 200 } // вчера
    ];
    const todayItems = items.filter(e => (e.datetime || '').slice(0,10) === today);
    const sumCal = todayItems.reduce((s,e) => s + (e.calories || 0), 0);
    const sumWater = todayItems.reduce((s,e) => s + (e.drinks_ml || 0), 0);
    t('сумма калорий за сегодня = 1050', () => eq(sumCal, 1050));
    t('сумма воды за сегодня = 750', () => eq(sumWater, 750));
  });

  group('Goals100 progress', (t) => {
    const goals = Array.from({length: 7}, (_, i) => ({ id: 'g'+i, done: i < 3 }));
    const done = goals.filter(g => g.done).length;
    const pct = Math.round(done / 100 * 100);
    t('3 / 100', () => eq(done, 3));
    t('процент = 3%', () => eq(pct, 3));
  });

  // ---------- Новые тесты ----------

  // Markdown
  function renderMarkdown(src) {
    if (!src) return '';
    let s = src.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    s = s.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c}</code></pre>`);
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  group('Markdown', (t) => {
    t('заголовок H1', () => assert(renderMarkdown('# Привет').includes('<h1>Привет</h1>')));
    t('жирный', () => assert(renderMarkdown('**bold**').includes('<strong>bold</strong>')));
    t('курсив', () => assert(renderMarkdown('a *it* b').includes('<em>it</em>')));
    t('код inline', () => assert(renderMarkdown('`x = 1`').includes('<code>x = 1</code>')));
    t('код блок', () => assert(renderMarkdown('```\nfoo\n```').includes('<pre><code>')));
    t('ссылка', () => assert(renderMarkdown('[ya](https://ya.ru)').includes('<a href="https://ya.ru"')));
    t('экранирует script', () => {
      const dangerous = '<' + 'script>alert(1)</' + 'script>';
      assert(!renderMarkdown(dangerous).includes('<' + 'script>'));
    });
  });

  // Recurrence
  function nextRecurrenceDate(rec, fromISO) {
    const d = new Date(fromISO);
    if (rec === 'daily') d.setDate(d.getDate() + 1);
    else if (rec === 'weekdays') {
      do { d.setDate(d.getDate() + 1); } while ([0,6].includes(d.getDay()));
    } else if (rec === 'weekly')  d.setDate(d.getDate() + 7);
    else if (rec === 'monthly') d.setMonth(d.getMonth() + 1);
    else return null;
    return d.toISOString().slice(0,10);
  }
  group('Recurrence', (t) => {
    t('daily +1', () => eq(nextRecurrenceDate('daily', '2026-04-21'), '2026-04-22'));
    t('weekly +7', () => eq(nextRecurrenceDate('weekly', '2026-04-21'), '2026-04-28'));
    t('monthly +1м', () => eq(nextRecurrenceDate('monthly', '2026-01-31'), '2026-03-03'));
    t('weekdays: с пятницы → понедельник', () => eq(nextRecurrenceDate('weekdays', '2026-04-24'), '2026-04-27'));
    t('weekdays: с понедельника → вторник', () => eq(nextRecurrenceDate('weekdays', '2026-04-20'), '2026-04-21'));
    t('пустой → null', () => eq(nextRecurrenceDate('', '2026-04-21'), null));
  });

  // Habit targets
  function habitProgress(habit, logs, today) {
    const target = habit.target_count;
    if (!target) return null;
    const period = habit.target_period || 'week';
    const days = period === 'week' ? 7 : 30;
    const range = Array.from({length: days}, (_, i) => addDaysISO(today, -(days - 1 - i)));
    const done = range.filter(d => isHabitDone(logs, habit.id, d)).length;
    return { done, target, period, pct: Math.round(done / target * 100) };
  }
  group('Habit targets', (t) => {
    const today = '2026-04-21';
    const logs = { h1: { '2026-04-21': true, '2026-04-20': true, '2026-04-19': true } };
    const habit = { id: 'h1', target_count: 5, target_period: 'week' };
    const p = habitProgress(habit, logs, today);
    t('progress: 3 из 5', () => { eq(p.done, 3); eq(p.target, 5); });
    t('процент 60%', () => eq(p.pct, 60));
    t('без цели → null', () => eq(habitProgress({ id: 'h1' }, logs, today), null));
    t('месяц считает 30 дней', () => {
      const monthLogs = { h2: Object.fromEntries(Array.from({length: 12}, (_, i) => [addDaysISO(today, -i), true])) };
      const p2 = habitProgress({ id: 'h2', target_count: 20, target_period: 'month' }, monthLogs, today);
      eq(p2.done, 12); eq(p2.pct, 60);
    });
  });

  // Emotions correlation (Pearson)
  function pearson(pairs) {
    const n = pairs.length;
    if (n < 3) return null;
    const mx = pairs.reduce((s,p) => s + p[0], 0) / n;
    const my = pairs.reduce((s,p) => s + p[1], 0) / n;
    const num = pairs.reduce((s,p) => s + (p[0]-mx) * (p[1]-my), 0);
    const denom = Math.sqrt(pairs.reduce((s,p) => s + (p[0]-mx)**2, 0) * pairs.reduce((s,p) => s + (p[1]-my)**2, 0));
    return denom ? num / denom : 0;
  }
  group('Emotions correlation', (t) => {
    t('идеальная положительная', () => {
      const r = pearson([[1,2],[2,4],[3,6],[4,8]]);
      assert(Math.abs(r - 1) < 1e-9, 'r=' + r);
    });
    t('идеальная отрицательная', () => {
      const r = pearson([[1,4],[2,3],[3,2],[4,1]]);
      assert(Math.abs(r - (-1)) < 1e-9, 'r=' + r);
    });
    t('отсутствие корреляции', () => {
      const r = pearson([[1,2],[2,2],[3,2],[4,2]]);
      eq(r, 0);
    });
    t('недостаточно данных → null', () => eq(pearson([[1,1]]), null));
  });

  // CSV
  function csvEscape(v) {
    const s = String(v ?? '');
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function parseCSV(text) {
    const rows = []; let row = []; let cur = ''; let inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQ = false;
        else cur += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(cur); cur = ''; }
        else if (c === '\n' || c === '\r') {
          if (cur || row.length) { row.push(cur); rows.push(row); row = []; cur = ''; }
          if (c === '\r' && text[i+1] === '\n') i++;
        } else cur += c;
      }
    }
    if (cur || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }
  group('CSV', (t) => {
    t('escape кавычек', () => eq(csvEscape('a"b'), '"a""b"'));
    t('escape запятой', () => eq(csvEscape('a,b'), '"a,b"'));
    t('escape перевода строки', () => eq(csvEscape('a\nb'), '"a\nb"'));
    t('просто строка', () => eq(csvEscape('hello'), 'hello'));
    t('parse простой', () => eq(parseCSV('a,b,c\n1,2,3'), [['a','b','c'],['1','2','3']]));
    t('parse с кавычками и запятыми', () => eq(parseCSV('a,"b,c",d'), [['a','b,c','d']]));
    t('parse экранированной кавычки', () => eq(parseCSV('"a""b"'), [['a"b']]));
    t('roundtrip', () => {
      const data = [['Цель','с,запятой','"кавычки"']];
      const csv = data[0].map(csvEscape).join(',');
      eq(parseCSV(csv), data);
    });
  });

  // Trash flow
  group('Trash flow', (t) => {
    const trash = [];
    function trashPush(type, item, label) { trash.unshift({ type, item, label, _trashed_at: new Date().toISOString() }); }
    trashPush('note', { id: 'n1', title: 'A' }, 'A');
    trashPush('goal', { id: 'g1', goal: 'B' }, 'B');
    t('добавление', () => eq(trash.length, 2));
    t('последний добавленный — первым', () => eq(trash[0].type, 'goal'));
    function restore(idx) {
      const e = trash[idx]; trash.splice(idx, 1); return e;
    }
    const restored = restore(0);
    t('восстановление возвращает запись', () => { eq(restored.type, 'goal'); eq(trash.length, 1); });
  });

  // Pomodoro stats
  group('Pomodoro stats', (t) => {
    const today = todayISO();
    const log = [
      { at: today + 'T09:00:00Z', minutes: 25 },
      { at: today + 'T10:00:00Z', minutes: 25 },
      { at: addDaysISO(today, -3) + 'T09:00:00Z', minutes: 25 },
      { at: addDaysISO(today, -10) + 'T09:00:00Z', minutes: 25 },
    ];
    const todayCount = log.filter(e => e.at.slice(0,10) === today).length;
    const weekCutoff = new Date(); weekCutoff.setDate(weekCutoff.getDate() - 6);
    const weekCount = log.filter(e => new Date(e.at) >= weekCutoff).length;
    const totalMin = log.reduce((s, e) => s + (e.minutes || 25), 0);
    t('today = 2', () => eq(todayCount, 2));
    t('week (7 дней) = 3', () => eq(weekCount, 3));
    t('total min = 100', () => eq(totalMin, 100));
  });

  // Food macros
  group('Food macros', (t) => {
    const items = [
      { protein: 20, fat: 10, carbs: 30 },
      { protein: 15, fat: 5, carbs: 25 },
      { protein: 0, fat: 0, carbs: 0 }
    ];
    const totalP = items.reduce((s, e) => s + (e.protein || 0), 0);
    const totalF = items.reduce((s, e) => s + (e.fat || 0), 0);
    const totalC = items.reduce((s, e) => s + (e.carbs || 0), 0);
    t('сумма белков = 35', () => eq(totalP, 35));
    t('сумма жиров = 15', () => eq(totalF, 15));
    t('сумма углеводов = 55', () => eq(totalC, 55));
    // Калории по 4-9-4
    const calc = totalP * 4 + totalF * 9 + totalC * 4;
    t('калории по макро (4-9-4) = 495', () => eq(calc, 35*4 + 15*9 + 55*4));
  });

  // Subtasks progress
  group('Subtasks', (t) => {
    const subs = [{ text: 'a', done: true }, { text: 'b', done: false }, { text: 'c', done: true }];
    const done = subs.filter(s => s.done).length;
    t('done = 2', () => eq(done, 2));
    t('progress 2/3', () => { eq(done, 2); eq(subs.length, 3); });
    const allDone = subs.every(s => s.done);
    t('not all done', () => eq(allDone, false));
  });

  // Search relevance
  function buildSearchIndex(query, sources) {
    const q = (query || '').toLowerCase().trim();
    if (!q) return [];
    const results = [];
    sources.tasks.forEach(t => {
      if ((t.title || '').toLowerCase().includes(q)) results.push({ type:'task', label: t.title });
    });
    sources.notes.forEach(n => {
      const all = (n.title + ' ' + (n.content || '') + ' ' + (n.tags || []).join(' ')).toLowerCase();
      if (all.includes(q)) results.push({ type:'note', label: n.title });
    });
    return results;
  }
  group('Global search', (t) => {
    const sources = {
      tasks: [{ title: 'Подготовить отчёт' }, { title: 'Купить хлеб' }],
      notes: [{ title: 'Книги', content: 'Atomic Habits', tags: ['чтение'] }]
    };
    t('по задаче', () => eq(buildSearchIndex('отчёт', sources).length, 1));
    t('по тегу заметки', () => eq(buildSearchIndex('чтение', sources).length, 1));
    t('по содержимому', () => eq(buildSearchIndex('atomic', sources).length, 1));
    t('пустой запрос', () => eq(buildSearchIndex('', sources), []));
    t('ничего не нашло', () => eq(buildSearchIndex('zzz', sources).length, 0));
  });

  clearTestKeys();

  // ---------- Рендер ----------
  const out = document.getElementById('out');
  let total = 0, passed = 0, failed = 0;
  Object.values(groups).forEach(g => {
    const h2 = document.createElement('h2'); h2.textContent = g.name; out.appendChild(h2);
    g.tests.forEach(t => {
      total++;
      if (t.ok) passed++; else failed++;
      const el = document.createElement('div');
      el.className = 't ' + (t.ok ? 'pass' : 'fail');
      el.textContent = t.label;
      out.appendChild(el);
      if (!t.ok) { const r = document.createElement('div'); r.className = 'reason'; r.textContent = t.err; out.appendChild(r); }
    });
  });
  const s = document.getElementById('summary');
  s.innerHTML = `
    <span class="stat total">Всего: ${total}</span>
    <span class="stat ok">Прошло: ${passed}</span>
    <span class="stat fail">Упало: ${failed}</span>`;
  window.__testResults = { total, passed, failed };
})();
</script>
</body>
</html>
